# Phase 4 W2 — local Postgres for operator services.
# Auto-mounts shared/db/migrations/0001_init.sql to /docker-entrypoint-initdb.d
# so the schema is created on first boot — no Prisma plumbing needed.
#
# Usage:
#   docker compose -f operator-services/docker-compose.yml up -d
#   DATABASE_URL=postgres://operator:operator@localhost:5432/eunoma
#
# Health: docker compose exec postgres pg_isready -U operator -d eunoma

services:
  postgres:
    image: postgres:16-alpine
    container_name: eunoma_postgres
    environment:
      POSTGRES_DB: eunoma
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    volumes:
      - ./shared/db/migrations:/docker-entrypoint-initdb.d:ro
      - eunoma_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d eunoma"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  eunoma_pg_data:
